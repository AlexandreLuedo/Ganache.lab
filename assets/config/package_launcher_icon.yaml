# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/Ganache.lab_logo.png"

  android: "launcher_icon"
  # image_path_android: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#FADDC6"
  adaptive_icon_foreground: "assets/icon/Ganache.lab_logo.png"
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: "assets/icon/Ganache.lab_logo_monochrome.png"

  ios: true
  image_path_ios: "assets/icon/apple/Ganache.lab_logo_bg_apple.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/icon/apple/Ganache.lab_logo_bg_dark_transparence.png"
  image_path_ios_tinted_grayscale: "assets/icon/apple/Ganache.lab_logo_bg_light_transparence.png"
  desaturate_tinted_to_grayscale_ios: true
  background_color_ios: "#FADDC6"

  web:
    generate: true
    image_path: "assets/icon/Ganache.lab_logo.png"
    background_color: "#FADDC6"
    theme_color: "#FADDC6"

  windows:
    generate: true
    image_path: "assets/icon/Ganache.lab_logo_256.png"
    icon_size: 256 # min:48, max:256, default: 48

  macos:
    generate: false
    image_path: "assets/icon/apple/Ganache.lab_logo_bg_apple.png"
